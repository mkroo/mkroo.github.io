baseURL = 'https://mkroo.com/'
languageCode = 'ko-KR'
title = 'mkroo tech blog'
theme = 'stack'
paginate = 10

[params]
  description = "개발과 기술에 대한 이야기"
  mainSections = ["posts"]

  [params.sidebar]
    compact = false
    subtitle = "개발과 기술에 대한 이야기를 공유합니다"

  [params.article]
    math = false
    toc = true
    readingTime = true

  [params.comments]
    enabled = false

  [params.colorScheme]
    toggle = true
    default = "auto"

  [params.widgets]
    homepage = []
    page = []

[[params.sidebar.social]]
  identifier = "github"
  name = "GitHub"
  url = "https://github.com/mkroo"
  weight = 1

[markup]
  [markup.highlight]
    lineNos = true
    style = "dracula"

[outputs]
  home = ["HTML", "RSS"]

[minify]
  disableXML = true
